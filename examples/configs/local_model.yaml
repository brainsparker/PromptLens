# Local Model Configuration
# Compare cloud models against local Ollama models

golden_set: ./examples/golden_sets/summarization.yaml

models:
  - name: "Claude 3.5 Sonnet"
    provider: anthropic
    model: claude-3-5-sonnet-20241022
    temperature: 0.7
    max_tokens: 1024

  - name: "Local Llama 3.1 8B"
    provider: http
    model: llama3.1:8b
    temperature: 0.7
    max_tokens: 1024
    additional_params:
      endpoint: "http://localhost:11434/api/generate"

judge:
  provider: anthropic
  model: claude-3-5-sonnet-20241022
  temperature: 0.3

execution:
  parallel_requests: 2
  retry_attempts: 2
  timeout_seconds: 120

output:
  directory: ./promptlens_results
  formats:
    - html
    - json
  run_name: "Summarization - Local vs Cloud"
